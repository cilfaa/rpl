<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<div class="app-container">

  <header class="app-header">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <button class="icon-btn" onclick="history.back()">
        <i class="bi bi-chevron-left"></i>
      </button>
      <h4 style="margin:0;font-weight:700;">M<span style="font-size:12px;">B</span>Grey</h4>
      <div style="width:24px;"></div>
    </div>
  </header>

  <main class="app-content" style="padding-top:32px;">

    <h2 style="margin-bottom:8px;">Create account</h2>
    <p style="color:#777;margin-bottom:32px;">
      Sign up to start managing your meal plan
    </p>

    <form id="signupForm" style="width:100%;">

      <div style="margin-bottom:20px;">
        <label style="font-size:14px;font-weight:600;">Username</label>
        <input type="text" id="username" placeholder="Choose a username" required 
		style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid #ddd;margin-top:8px;
            font-size:15px;"/>
      </div>
      
      <div style="margin-bottom:20px;">
        <label style="font-size:14px;font-weight:600;">Email</label>
        <input type="text" id="email" placeholder="Ketik email" required
          style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid #ddd;margin-top:8px;font-size:15px;"/>
      </div>

      <div style="margin-bottom:20px;">
        <label style="font-size:14px;font-weight:600;">Password</label>
        <input type="password" id="password" placeholder="Create a password" required
          style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid #ddd;margin-top:8px;font-size:15px;"/>
      </div>

      <div style="margin-bottom:28px;">
        <label style="font-size:14px;font-weight:600;">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" required 
		style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid #ddd;margin-top:8px;font-size:15px;"/>
      </div>

      <button type="submit" class="btn-make" style="background:#FFD400;border:none;padding:14px;font-size:16px;border-radius:999px;">
        Sign Up
      </button>

    </form>

    <p style="text-align:center;margin-top:24px;font-size:13px;color:#777; ">
      Already have an account?
      <a href="login.html" style="font-weight:700;color:#000;text-decoration:none;">
        Login
      </a>
    </p>

  </main>

</div>

<script>
  document.getElementById('signupForm').addEventListener('submit', function (e) {
    e.preventDefault()

    const username = document.getElementById('username').value
    const password = document.getElementById('password').value
    const confirmPassword = document.getElementById('confirmPassword').value

    if (password !== confirmPassword) {
      alert('Password tidak sama')
      return
    }

    localStorage.setItem('registeredUsername', username)
    localStorage.setItem('registeredPassword', password)

    alert('Signup berhasil, silakan login')
    window.location.href = 'login.html'
  })
</script>

</body>
</html>
