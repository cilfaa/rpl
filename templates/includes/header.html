{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meal Plan App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'assets/style.css' %}">
</head>
<body>

<div class="app-container">

  <header class="app-header">
    <div class="d-flex justify-content-between align-items-center">
      <div></div>
      <h4 class="fw-bold m-0">MB<span class="small">Growth</span></h4>
      <button class="icon-btn" id="openSearch">
        <i class="bi bi-search fs-5"></i>
      </button>
    </div>
  </header>

  <div class="search-bar" id="searchBar">
    <form method="GET" action="{% url 'mealplan:search' %}">
      <i class="bi bi-search"></i>
      <input type="text" name="q" value="{{ search_query }}" placeholder="Cari menu, kalori, protein...">
    </form>
  </div>
