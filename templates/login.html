{% include 'includes/header.html' %}

<main class="app-content authorize">
  <h2>Welcome back</h2>
  <p class="subtitle">Login to manage your meal plan</p>

  {% if messages %}
    {% for message in messages %}
      <div class="alert-message">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
  <form id="loginForm" method="POST" action="{% url 'mealplan:masuk' %}">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
    </div>

    <button type="submit" id="authorizeBtn">
      Login
    </button>

  </form>

  <p class="switch-link">
    Don't have an account?
    <a href="{% url 'mealplan:daftar' %}">Sign up</a>
  </p>

</main>

{% include 'includes/footer.html' %}
